<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Cup Knockout Stage</title>

<style>

body{
    margin:0;
    background:#f3f4f6;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.stage{
    margin-bottom:50px;
}

.stage h2{
    margin-bottom:20px;
    color:#111827;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
}

.match{
    background:white;
    border-radius:14px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    overflow:hidden;
}

.team{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
}

.team:first-child{
    border-bottom:1px solid #ececec;
}

.left{
    display:flex;
    flex-direction:column;
}

.country{
    font-weight:bold;
    font-size:17px;
}

.owner{
    color:#777;
    font-size:13px;
    margin-top:3px;
}

.score{
    font-size:20px;
    font-weight:bold;
}

.status{
    padding:10px 18px;
    background:#f8fafc;
    color:#666;
    font-size:13px;
    border-top:1px solid #ececec;
}

</style>

</head>

<body>

<div class="container">

<h1>🏆 World Cup Knockout Stage</h1>

<div class="stage">
<h2>Round of 32</h2>
<div class="grid" id="r32"></div>
</div>

<div class="stage">
<h2>Round of 16</h2>
<div class="grid" id="r16"></div>
</div>

<div class="stage">
<h2>Quarter-finals</h2>
<div class="grid" id="qf"></div>
</div>

<div class="stage">
<h2>Semi-finals</h2>
<div class="grid" id="sf"></div>
</div>

<div class="stage">
<h2>Final</h2>
<div class="grid" id="final"></div>
</div>

<script>

const API_URL = "https://worldcup-api-proxy.choe-soojin.workers.dev";

const drawData = [
  { participant:"Alex Haines", country:"Norway"},
  { participant:"Allison Clark", country:"South Africa"},
  { participant:"Andrew Snoad", country:"Morocco"},
  { participant:"Andrew Snoad", country:"Switzerland"},
  { participant:"Anna Smith", country:"Argentina"},
  { participant:"Charlie Finchett", country:"Belgium"},
  { participant:"Chris Flach", country:"Jordan"},
  { participant:"Chris Flach", country:"Mexico"},
  { participant:"Dami Osibeluwo", country:"Austria"},
  { participant:"David Mann", country:"Congo (DRC)"},
  { participant:"David Mann", country:"Australia"},
  { participant:"Ed Hull", country:"France"},
  { participant:"Ed Hull", country:"England"},
  { participant:"Emily Davis", country:"Japan"},
  { participant:"Gary Hutton", country:"Panama"},
  { participant:"Gary Hutton", country:"Ecuador"},
  { participant:"Gerri Speirs", country:"United States"},
  { participant:"Jack Cornish", country:"Senegal"},
  { participant:"Joanna Guentangue", country:"Colombia"},
  { participant:"Joseph Bluemel", country:"Canada"},
  { participant:"Katie Lovegrove", country:"Qatar"},
  { participant:"Luke Armitage", country:"Iran"},
  { participant:"Mark Wallace", country:"Scotland"},
  { participant:"Matthew Miller", country:"Türkiye"},
  { participant:"Matthew Miller", country:"Saudi Arabia"},
  { participant:"Nibash Gun", country:"Germany"},
  { participant:"Nicholas Crowe", country:"Curacao"},
  { participant:"Nicholas Crowe", country:"Ghana"},
  { participant:"Niel Du Preez", country:"Brazil"},
  { participant:"Nikki Foxall", country:"Egypt"},
  { participant:"Patrick Ahern", country:"Haiti"},
  { participant:"Peter Benning", country:"Croatia"},
  { participant:"Peter Benning", country:"Spain"},
  { participant:"Peter Robinson", country:"Cabo Verde"},
  { participant:"Peter Robinson", country:"Uzbekistan"},
  { participant:"Rob McBride", country:"Tunisia"},
  { participant:"Samuel Davies", country:"Bosnia & Herzegovina"},
  { participant:"Samuel Davies", country:"Iraq"},
  { participant:"Sarah Fallon", country:"Côte d’Ivoire"},
  { participant:"Sean Berry", country:"Czechia"},
  { participant:"Shayna Gail Velasquez", country:"Sweden"},
  { participant:"Soojin Choe", country:"Uruguay"},
  { participant:"Soojin Choe", country:"Portugal"},
  { participant:"Terry Gell", country:"Korea"},
  { participant:"Thomas Blunt", country:"New Zealand"},
  { participant:"Thomas Blunt", country:"Netherlands"},
  { participant:"Tim Hewer", country:"Algeria"},
  { participant:"Tim Hewer", country:"Paraguay"}
];

const aliases = {
  "Korea Republic":"Korea",
  "Republic of Korea":"Korea",
  "South Korea":"Korea",
  "IR Iran":"Iran",
  "Turkey":"Türkiye",
  "United States of America":"United States",
  "Curaçao":"Curacao",
  "Bosnia and Herzegovina":"Bosnia & Herzegovina",
  "Cote d'Ivoire":"Côte d’Ivoire",
  "Ivory Coast":"Côte d’Ivoire",
  "Cape Verde":"Cabo Verde",
  "DR Congo":"Congo (DRC)"
};

function normalize(name){
    return aliases[name] || name || "TBD";
}

function owner(country){
    return drawData
        .filter(x => normalize(x.country) === normalize(country))
        .map(x => x.participant)
        .join(", ");
}

function score(match, side){

    if(match.status==="TIMED" || match.status==="SCHEDULED"){
        return "-";
    }

    return (
        match.score?.fullTime?.[side] ??
        match.score?.regularTime?.[side] ??
        match.score?.extraTime?.[side] ??
        "-"
    );
}

function renderMatch(match){

    const home = normalize(match.homeTeam?.name);
    const away = normalize(match.awayTeam?.name);

    return `
    <div class="match">

        <div class="team">
            <div class="left">
                <div class="country">${home}</div>
                <div class="owner">${owner(home) || "No owner"}</div>
            </div>
            <div class="score">${score(match,"home")}</div>
        </div>

        <div class="team">
            <div class="left">
                <div class="country">${away}</div>
                <div class="owner">${owner(away) || "No owner"}</div>
            </div>
            <div class="score">${score(match,"away")}</div>
        </div>

const kickoff = new Date(match.utcDate).toLocaleString("en-GB",{
    timeZone:"Europe/London",
    day:"2-digit",
    month:"short",
    hour:"2-digit",
    minute:"2-digit"
});

...

<div class="status">
    ${kickoff} • ${match.status}
</div>

    </div>
    `;
}

function renderStage(matches, stage, id){

    const html = matches
        .filter(m => m.stage === stage)
       .sort((a,b)=>{

    if(a.utcDate===b.utcDate){
        return a.id-b.id;
    }

    return new Date(a.utcDate)-new Date(b.utcDate);

})
        .map(renderMatch)
        .join("");

    document.getElementById(id).innerHTML =
        html || "<p>No matches yet.</p>";
}

async function loadBracket(){

    try{

        const response = await fetch(API_URL);

        const data = await response.json();

        const matches = data.matches || [];

        renderStage(matches,"LAST_32","r32");
        renderStage(matches,"LAST_16","r16");
        renderStage(matches,"QUARTER_FINALS","qf");
        renderStage(matches,"SEMI_FINALS","sf");
        renderStage(matches,"FINAL","final");

    }
    catch(err){

        console.error(err);

        document.querySelectorAll(".grid").forEach(g=>{
            g.innerHTML="<p>Unable to load matches.</p>";
        });

    }

}

loadBracket();

</script>

</body>

</html>
