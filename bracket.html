<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Knockout Stage</title>

<style>

body{
    margin:0;
    background:#f3f4f6;
    font-family:Arial,sans-serif;
    color:#111827;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:32px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.stage{
    margin-bottom:45px;
}

.stage h2{
    margin-bottom:18px;
    font-size:28px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:18px;
}

.match{
    background:white;
    border-radius:14px;
    border:1px solid #e5e7eb;
    overflow:hidden;
}

.team{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
}

.team:first-child{
    border-bottom:1px solid #ececec;
}

.left{
    display:flex;
    flex-direction:column;
}

.country{
    font-weight:700;
    font-size:17px;
}

.owner{
    font-size:13px;
    color:#6b7280;
    margin-top:3px;
}

.score{
    font-size:22px;
    font-weight:700;
}

.footer{
    display:flex;
    justify-content:space-between;
    padding:12px 18px;
    background:#f9fafb;
    font-size:13px;
    color:#6b7280;
}

.badge{
    padding:3px 10px;
    border-radius:999px;
    font-weight:600;
}

.live{
    background:#fee2e2;
    color:#b91c1c;
}

.finished{
    background:#dcfce7;
    color:#166534;
}

.scheduled{
    background:#e0e7ff;
    color:#3730a3;
}

.empty{
    color:#9ca3af;
    padding:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🏆 World Cup Knockout Stage</h1>

<div class="stage">
<h2>Round of 32</h2>
<div class="grid" id="r32"></div>
</div>

<div class="stage">
<h2>Round of 16</h2>
<div class="grid" id="r16"></div>
</div>

<div class="stage">
<h2>Quarter-finals</h2>
<div class="grid" id="qf"></div>
</div>

<div class="stage">
<h2>Semi-finals</h2>
<div class="grid" id="sf"></div>
</div>

<div class="stage">
<h2>Final</h2>
<div class="grid" id="final"></div>
</div>

<script>

const API_URL="https://worldcup-api-proxy.choe-soojin.workers.dev";

/* drawData는 지금 index.html에 있는 것을 그대로 붙여넣기 */
const drawData=[

/* 여기 기존 drawData 그대로 */

];

/* aliases도 기존 것 그대로 붙여넣기 */

const aliases={

/* 기존 aliases 그대로 */

};

function normalize(name){
    return aliases[name] || name || "TBD";
}

function owner(country){

    const list=drawData
        .filter(x=>normalize(x.country)===normalize(country))
        .map(x=>x.participant);

    return list.length?list.join(", "):"No owner";
}

function score(match,side){

    if(match.status==="TIMED"||match.status==="SCHEDULED")
        return "-";

    return(
        match.score?.fullTime?.[side] ??
        match.score?.regularTime?.[side] ??
        match.score?.extraTime?.[side] ??
        "-"
    );
}

function kickoff(match){

    return new Date(match.utcDate).toLocaleString("en-GB",{
        timeZone:"Europe/London",
        day:"2-digit",
        month:"short",
        hour:"2-digit",
        minute:"2-digit"
    });

}

function badge(status){

    if(status==="IN_PLAY"||status==="PAUSED")
        return '<span class="badge live">LIVE</span>';

    if(status==="FINISHED")
        return '<span class="badge finished">FT</span>';

    return '<span class="badge scheduled">Scheduled</span>';

}

function renderMatch(match){

    const home=normalize(match.homeTeam?.name);
    const away=normalize(match.awayTeam?.name);

    return`

<div class="match">

<div class="team">
<div class="left">
<div class="country">${home}</div>
<div class="owner">${owner(home)}</div>
</div>
<div class="score">${score(match,"home")}</div>
</div>

<div class="team">
<div class="left">
<div class="country">${away}</div>
<div class="owner">${owner(away)}</div>
</div>
<div class="score">${score(match,"away")}</div>
</div>

<div class="footer">
<div>${kickoff(match)}</div>
<div>${badge(match.status)}</div>
</div>

</div>

`;

}

function renderStage(matches,stage,id){

    const html=matches
    .filter(m=>m.stage===stage)
    .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate))
    .map(renderMatch)
    .join("");

    document.getElementById(id).innerHTML=
        html || '<div class="empty">No matches yet.</div>';

}

async function load(){

    const res=await fetch(API_URL);
    const data=await res.json();

    const matches=data.matches||[];

    renderStage(matches,"LAST_32","r32");
    renderStage(matches,"LAST_16","r16");
    renderStage(matches,"QUARTER_FINALS","qf");
    renderStage(matches,"SEMI_FINALS","sf");
    renderStage(matches,"FINAL","final");

}

load();

</script>

</body>
</html>
