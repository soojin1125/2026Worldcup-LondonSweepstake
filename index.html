<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Sweepstake</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f5f7;
      color: #1f2937;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 32px;
    }

    h2 {
      margin-top: 32px;
      margin-bottom: 16px;
    }

    .box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .match-item {
      border-bottom: 1px solid #eeeeee;
      padding: 16px 0;
    }

    .match-item:last-child {
      border-bottom: none;
    }

    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
      flex: 1;
    }

    .team.right {
      justify-content: flex-end;
      text-align: right;
    }

    .flag {
      width: 24px;
      height: 18px;
      object-fit: cover;
      border: 1px solid #ddd;
      border-radius: 3px;
      background: #fff;
    }

    .team-name {
      font-weight: bold;
    }

    .owner {
      color: #6b7280;
      font-size: 0.9rem;
      margin-top: 2px;
    }

    .score {
      font-size: 1.1rem;
      font-weight: bold;
      min-width: 70px;
      text-align: center;
    }

    .status {
      margin-top: 6px;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    .participant {
      color: #7ac943;
      font-weight: bold;
      text-align: center;
      margin-bottom: 12px;
    }

    .country-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .country {
      font-weight: bold;
    }

    @media (max-width: 640px) {
      .team {
        min-width: 100%;
      }

      .score {
        width: 100%;
      }

      .team.right {
        justify-content: flex-start;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏆 World Cup Sweepstake</h1>
    <div class="subtitle">Match Results by Team Owner</div>

    <h2>Match Results by Team Owner</h2>
    <div class="box" id="match-results"></div>

    <h2>Draw Results</h2>
    <div class="cards" id="draw-results"></div>
  </div>

  <script>
    const drawData = [

      { participant: "Soojin Choe", country: "Portugal" },
      { participant: "Terry Gell", country: "Korea" },
      { participant: "Thomas Blunt", country: "New Zealand" },
      { participant: "Thomas Blunt", country: "Netherlands" },
      { participant: "Tim Hewer", country: "Algeria" },
      { participant: "Tim Hewer", country: "Paraguay" }
    ];

    const sampleMatches = [
      { homeTeam: "Portugal", awayTeam: "Brazil", homeScore: 2, awayScore: 1, status: "LIVE" },
      { homeTeam: "Korea", awayTeam: "Uruguay", homeScore: 0, awayScore: 0, status: "HT" },
      { homeTeam: "Netherlands", awayTeam: "England", homeScore: 1, awayScore: 3, status: "FT" }
    ];

    const countryAliases = {
      "South Korea": "Korea",
      "Ivory Coast": "Côte d’Ivoire",
      "Turkey": "Türkiye",
      "USA": "United States",
      "United States of America": "United States",

    };

    const flagMap = {

      "Iraq": "https://flagcdn.com/24x18/iq.png",
      "Côte d’Ivoire": "https://flagcdn.com/24x18/ci.png",
      "Czechia": "https://flagcdn.com/24x18/cz.png",
      "Sweden": "https://flagcdn.com/24x18/se.png",
      "Uruguay": "https://flagcdn.com/24x18/uy.png",
      "Portugal": "https://flagcdn.com/24x18/pt.png",
      "Korea": "https://flagcdn.com/24x18/kr.png",
      "New Zealand": "https://flagcdn.com/24x18/nz.png",
      "Netherlands": "https://flagcdn.com/24x18/nl.png",
      "Algeria": "https://flagcdn.com/24x18/dz.png",
      "Paraguay": "https://flagcdn.com/24x18/py.png"
    };

    function normalizeCountry(name) {
      return countryAliases[name] || name;
    }

    function getOwners(country) {
      const target = normalizeCountry(country);
      const owners = [];
      for (let i = 0; i < drawData.length; i++) {
        if (normalizeCountry(drawData[i].country) === target) {
          owners.push(drawData[i].participant);
        }
      }
      return owners;
    }

    function getFlag(country) {
      const target = normalizeCountry(country);
      return flagMap[target] || "";
    }

    function renderDrawResults() {
      const container = document.getElementById("draw-results");
      container.innerHTML = "";

      for (let i = 0; i < drawData.length; i++) {
        const item = drawData[i];
        const flag = getFlag(item.country);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="participant">${item.participant}</div>
          <div class="country-line">
            ${flag ? `<img class="flag" src="${flag}" alt="${item.country} flag" onerror="this.style.display='none'  `;

        container.appendChild(card);
      }
    }

    function renderMatchResults() {
      const container = document.getElementById("match-results");
      container.innerHTML = "";

      for (let i = 0; i < sampleMatches.length; i++) {
        const match = sampleMatches[i];
        const homeOwners = getOwners(match.homeTeam);
        const awayOwners = getOwners(match.awayTeam);
        const homeFlag = getFlag(match.homeTeam);
        const awayFlag = getFlag(match.awayTeam);

        const item = document.createElement("div");
        item.className = "match-item";

        item.innerHTML = `
          <div class="match-row">
            <div class="team">
              ${homeFlag ? `<img class="flag" src="${homeFlag}" alt="${match.homeTeam} flag" onerror="this.style.display='none'v>
                <div class="owner">${homeOwners.length ? homeOwners.join(", ") : "No owner"}</div>
              </div>
            </div>

            <div class="score">${match.homeScore} - ${match.awayScore}</div>

            <div class="team right">
              <div>
                <div class="team-name">${match.awayTeam}</div>
                <div class="owner">${awayOwners.length ? awayOwners.join(", ") : "No owner"}</div>
              </div>
              ${awayFlag ? `<img class="flag" src="${awayFlag}" alt="${match.awayTeam} flag" onerror="this.style.display='none'h.status}</div>
        `;

        container.appendChild(item);
      }
    }

    renderMatchResults();
    renderDrawResults();
  </script>
</body>
</html>
