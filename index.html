<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<h1>TEST 123 - World Cup Sweepstake</h1>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .container {
      max-width: 1250px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2.2rem;
      color: #111827;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }

    h2 {
      margin-top: 32px;
      margin-bottom: 16px;
      font-size: 2rem;
      color: #111827;
    }

    .box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 8px 18px;
      margin-bottom: 32px;
    }

    .match-item {
      padding: 18px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .match-item:last-child {
      border-bottom: none;
    }

    .match-line {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 16px;
    }

    .team-left,
    .team-right {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .team-left {
      justify-content: flex-start;
      text-align: left;
    }

    .team-right {
      justify-content: flex-end;
      text-align: right;
    }

    .team-name {
      font-weight: 700;
      color: #111827;
      white-space: nowrap;
    }

    .owner {
      color: #6b7280;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .score {
      font-weight: 700;
      font-size: 1.1rem;
      color: #111827;
      text-align: center;
      min-width: 72px;
    }

    .status {
      margin-top: 8px;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .meta {
      margin-top: 4px;
      color: #6b7280;
      font-size: 0.88rem;
    }

    .loading,
    .error,
    .empty {
      padding: 18px 0;
      color: #6b7280;
    }

    .error {
      color: #b91c1c;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      text-align: left;
    }

    .country {
      color: #1e3a8a;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .participant {
      color: #6b7280;
      font-size: 0.95rem;
    }

    @media (max-width: 850px) {
      .match-line {
        grid-template-columns: 1fr;
        row-gap: 8px;
      }

      .team-right {
        justify-content: flex-start;
        text-align: left;
      }

      .score {
        text-align: left;
      }

      h2 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
