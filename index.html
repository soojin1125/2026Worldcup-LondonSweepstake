<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Sweepstake</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .container {
      max-width: 1250px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2.2rem;
      color: #111827;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }

    h2 {
      margin-top: 32px;
      margin-bottom: 8px;
      font-size: 2rem;
      color: #111827;
    }

    .section-note {
      color: #6b7280;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 8px 18px;
      margin-bottom: 32px;
    }

    .match-item {
      padding: 18px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .match-item:last-child {
      border-bottom: none;
    }

    .match-line {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 16px;
    }

    .team-left,
    .team-right {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .team-left {
      justify-content: flex-start;
      text-align: left;
    }

    .team-right {
      justify-content: flex-end;
      text-align: right;
    }

    .team-name {
      font-weight: 700;
      color: #111827;
      white-space: nowrap;
    }

    .owner {
      color: #6b7280;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .score {
      font-weight: 700;
      font-size: 1.1rem;
      color: #111827;
      text-align: center;
      min-width: 72px;
    }

    .status {
      margin-top: 8px;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .meta {
      margin-top: 4px;
      color: #6b7280;
      font-size: 0.88rem;
    }

    .message {
      padding: 18px 0;
      color: #6b7280;
    }

    .message.error {
      color: #b91c1c;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      text-align: left;
    }

    .country {
      color: #1e3a8a;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .participant {
      color: #6b7280;
      font-size: 0.95rem;
    }

    @media (max-width: 850px) {
      .match-line {
        grid-template-columns: 1fr;
        row-gap: 8px;
      }

      .team-right {
        justify-content: flex-start;
        text-align: left;
      }

      .score {
        text-align: left;
      }

      h2 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏆 World Cup Sweepstake</h1>
    
    <h2>Match Results by Team Owner</h2>
    <div class="section-note">
      Showing the latest 8 finished matches first, then all live matches, followed by the next 6 upcoming matches in chronological order.
    </div>
    <div class="box" id="match-results">
      <div class="message">Loading World Cup matches...</div>
    </div>

    <h2>Draw Results</h2>
    <div class="cards" id="draw-results"></div>
  </div>

  <script>
    // Change this only if your Worker URL is different
    const API_URL = "https://worldcup-api-proxy.choe-soojin.workers.dev";

    const drawData = [
      { participant: "Alex Haines", country: "Norway" },
      { participant: "Allison Clark", country: "South Africa" },
      { participant: "Andrew Snoad", country: "Morocco" },
      { participant: "Andrew Snoad", country: "Switzerland" },
      { participant: "Anna Smith", country: "Argentina" },
      { participant: "Charlie Finchett", country: "Belgium" },
      { participant: "Chris Flach", country: "Jordan" },
      { participant: "Chris Flach", country: "Mexico" },
      { participant: "Dami Osibeluwo", country: "Austria" },
      { participant: "David Mann", country: "Congo (DRC)" },
      { participant: "David Mann", country: "Australia" },
      { participant: "Ed hull", country: "France" },
      { participant: "Ed hull", country: "England" },
      { participant: "Emily Davis", country: "Japan" },
      { participant: "Gary Hutton", country: "Panama" },
      { participant: "Gary Hutton", country: "Ecuador" },
      { participant: "Gerri Speirs", country: "United States" },
      { participant: "Jack Cornish", country: "Senegal" },
      { participant: "Joanna Guentangue", country: "Colombia" },
      { participant: "Joseph Bluemel", country: "Canada" },
      { participant: "Katie Lovegrove", country: "Qatar" },
      { participant: "Luke Armitage", country: "Iran" },
      { participant: "Mark Wallace", country: "Scotland" },
      { participant: "Matthew Miller", country: "Türkiye" },
      { participant: "Matthew Miller", country: "Saudi Arabia" },
      { participant: "Nibash Gun", country: "Germany" },
      { participant: "Nicholas Crowe", country: "Curacao" },
      { participant: "Nicholas Crowe", country: "Ghana" },
      { participant: "Niel Du Preez", country: "Brazil" },
      { participant: "Nikki Foxall", country: "Egypt" },
      { participant: "Patrick Ahern", country: "Haiti" },
      { participant: "Peter Benning", country: "Croatia" },
      { participant: "Peter Benning", country: "Spain" },
      { participant: "Peter Robinson", country: "Cabo Verde" },
      { participant: "Peter Robinson", country: "Uzbekistan" },
      { participant: "Rob McBride", country: "Tunisia" },
      { participant: "Samuel Davies", country: "Bosnia & Herzegovina" },
      { participant: "Samuel Davies", country: "Iraq" },
      { participant: "Sarah Fallon", country: "Côte d’Ivoire" },
      { participant: "Sean Berry", country: "Czechia" },
      { participant: "Shayna Gail Velasquez", country: "Sweden" },
      { participant: "Soojin Choe", country: "Uruguay" },
      { participant: "Soojin Choe", country: "Portugal" },
      { participant: "Terry Gell", country: "Korea" },
      { participant: "Thomas Blunt", country: "New Zealand" },
      { participant: "Thomas Blunt", country: "Netherlands" },
      { participant: "Tim Hewer", country: "Algeria" },
      { participant: "Tim Hewer", country: "Paraguay" }
    ];

    const fallbackMatches = [
      { homeTeam: "Portugal", awayTeam: "Brazil", homeScore: 2, awayScore: 1, status: "Live", meta: "Sample data" },
      { homeTeam: "Korea", awayTeam: "Uruguay", homeScore: 0, awayScore: 0, status: "Half-time", meta: "Sample data" },
      { homeTeam: "Netherlands", awayTeam: "England", homeScore: 1, awayScore: 3, status: "Finished", meta: "Sample data" }
    ];

    const countryAliases = {
      "Korea Republic": "Korea",
      "Republic of Korea": "Korea",
      "South Korea": "Korea",
      "IR Iran": "Iran",
      "Iran": "Iran",
      "Türkiye": "Türkiye",
      "Turkey": "Türkiye",
      "United States of America": "United States",
      "USA": "United States",
      "Curaçao": "Curacao",
      "Bosnia and Herzegovina": "Bosnia & Herzegovina",
      "Cote d'Ivoire": "Côte d’Ivoire",
      "Côte d'Ivoire": "Côte d’Ivoire",
      "Ivory Coast": "Côte d’Ivoire",
      "Cape Verde": "Cabo Verde",
      "DR Congo": "Congo (DRC)",
      "Congo DR": "Congo (DRC)"
    };

    const statusLabels = {
      IN_PLAY: "Live",
      PAUSED: "Half-time",
      FINISHED: "Finished",
      TIMED: "Scheduled",
      SCHEDULED: "Scheduled",
      POSTPONED: "Postponed",
      SUSPENDED: "Suspended",
      CANCELLED: "Cancelled"
    };

    function normalizeCountry(name) {
      return countryAliases[name] || name;
    }

    function getOwners(country) {
      const target = normalizeCountry(country);
      const owners = [];
      for (let i = 0; i < drawData.length; i++) {
        if (normalizeCountry(drawData[i].country) === target) {
          owners.push(drawData[i].participant);
        }
      }
      return owners;
    }

    function formatStatus(status) {
      return statusLabels[status] || status || "";
    }

    function formatKickoff(utcDate) {
      if (!utcDate) return "";
      try {
        const d = new Date(utcDate);
        return d.toLocaleString("en-GB", {
          day: "2-digit",
          month: "short",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch (e) {
        return "";
      }
    }

    function getScoreValue(match, side) {
      if (!match || !match.score) return "-";

      if (match.status === "TIMED" || match.status === "SCHEDULED") {
        return "-";
      }

      const score = match.score;
      const candidates = [
        score.fullTime,
        score.regularTime,
        score.extraTime,
        score.halfTime
      ];

      for (let i = 0; i < candidates.length; i++) {
        const part = candidates[i];
        if (part && part[side] !== null && part[side] !== undefined) {
          return part[side];
        }
      }

      return "-";
    }

    function getMatchTime(match) {
      const t = new Date(match.utcDate).getTime();
      return Number.isFinite(t) ? t : 0;
    }

    function renderDraws() {
      const container = document.getElementById("draw-results");
      let html = "";

      for (let i = 0; i < drawData.length; i++) {
        const item = drawData[i];
        html += `
          <div class="card">
            <div class="country">${item.country}</div>
            <div class="participant">${item.participant}</div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function renderFallbackMatches(noteText) {
      const container = document.getElementById("match-results");
      let html = "";

      if (noteText) {
        html += `<div class="message error">${noteText}</div>`;
      }

      for (let i = 0; i < fallbackMatches.length; i++) {
        const match = fallbackMatches[i];
        const homeOwnerText = getOwners(match.homeTeam).join(", ") || "No owner";
        const awayOwnerText = getOwners(match.awayTeam).join(", ") || "No owner";

        html += `
          <div class="match-item">
            <div class="match-line">
              <div class="team-left">
                <span class="team-name">${match.homeTeam}</span>
                <span class="owner">(${homeOwnerText})</span>
              </div>

              <div class="score">${match.homeScore} : ${match.awayScore}</div>

              <div class="team-right">
                <span class="team-name">${match.awayTeam}</span>
                <span class="owner">(${awayOwnerText})</span>
              </div>
            </div>
            <div class="status">Status: ${match.status}</div>
            <div class="meta">${match.meta}</div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function pickMatches(matches) {
      const liveStatuses = ["IN_PLAY", "PAUSED"];
      const finishedStatuses = ["FINISHED"];
      const upcomingStatuses = ["TIMED", "SCHEDULED"];

      const finished = matches
        .filter(match => finishedStatuses.includes(match.status))
        .sort((a, b) => getMatchTime(b) - getMatchTime(a))
        .slice(0, 8)
        .sort((a, b) => getMatchTime(a) - getMatchTime(b));

      const live = matches
        .filter(match => liveStatuses.includes(match.status))
        .sort((a, b) => getMatchTime(a) - getMatchTime(b));

      const upcoming = matches
        .filter(match => upcomingStatuses.includes(match.status))
        .sort((a, b) => getMatchTime(a) - getMatchTime(b))
        .slice(0, 6);

      return [...finished, ...live, ...upcoming];
    }

    function renderApiMatches(matches) {
      const container = document.getElementById("match-results");

      if (!matches || matches.length === 0) {
        renderFallbackMatches("No World Cup matches returned from API. Showing sample matches instead.");
        return;
      }

      let html = "";

      for (let i = 0; i < matches.length; i++) {
        const match = matches[i];
        const homeNameRaw = match.homeTeam?.name || "Home team";
        const awayNameRaw = match.awayTeam?.name || "Away team";

        const homeName = normalizeCountry(homeNameRaw);
        const awayName = normalizeCountry(awayNameRaw);

        const homeOwnerText = getOwners(homeName).join(", ") || "No owner";
        const awayOwnerText = getOwners(awayName).join(", ") || "No owner";

        const homeScore = getScoreValue(match, "home");
        const awayScore = getScoreValue(match, "away");

        const metaText = [
          formatKickoff(match.utcDate),
          match.group ? `Group ${match.group}` : "",
          match.stage || ""
        ].filter(Boolean).join(" · ");

        html += `
          <div class="match-item">
            <div class="match-line">
              <div class="team-left">
                <span class="team-name">${homeName}</span>
                <span class="owner">(${homeOwnerText})</span>
              </div>

              <div class="score">${homeScore} : ${awayScore}</div>

              <div class="team-right">
                <span class="team-name">${awayName}</span>
                <span class="owner">(${awayOwnerText})</span>
              </div>
            </div>
            <div class="status">Status: ${formatStatus(match.status)}</div>
            <div class="meta">${metaText}</div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    async function fetchWorldCupMatches() {
      renderDraws();

      if (!API_URL) {
        renderFallbackMatches("API URL is missing. Showing sample matches instead.");
        return;
      }

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const response = await fetch(API_URL, {
          method: "GET",
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (!response.ok) {
          const errorText = await response.text();
          console.error("Worker HTTP error:", response.status, errorText);
          renderFallbackMatches("Worker/API request failed. Showing sample matches instead.");
          return;
        }

        const data = await response.json();
        console.log("Worker response:", data);

        const matches = Array.isArray(data.matches) ? data.matches : [];
        const selectedMatches = pickMatches(matches);

        renderApiMatches(selectedMatches);
      } catch (error) {
        console.error("Failed to fetch Worker data:", error);
        renderFallbackMatches("Could not load API data. Showing sample matches instead.");
      }
    }

    fetchWorldCupMatches();
  </script>
</body>
</html>
