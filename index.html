<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Sweepstake</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --green: #7ac943;
      --border: #e5e7eb;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .section-title {
      margin: 28px 0 16px;
      font-size: 1.4rem;
    }

    .live-box {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-top: 8px;
    }

    .match-list {
      margin: 12px 0 0 0;
      padding: 0;
      list-style: none;
    }

    .match-list li {
      padding: 14px 0;
      border-bottom: 1px solid #eee;
      line-height: 1.7;
    }

    .match-list li:last-child {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      background: #eef9e8;
      color: #3b7f1b;
      border: 1px solid #d8f0ca;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .team-block {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      flex: 1;
    }

    .team-flag {
      width: 24px;
      height: 18px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid #ddd;
    }

    .score-block {
      font-weight: 700;
      font-size: 1.1rem;
      min-width: 80px;
      text-align: center;
    }

    .owner {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 2px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      box-shadow: var(--shadow);
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .participant {
      text-align: center;
      color: var(--green);
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 10px;
    }

    .country {
      font-size: 1rem;
      font-weight: 600;
      text-align: left;
    }

    .country-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-note {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    @media (max-width: 640px) {
      .hero h1 { font-size: 1.6rem; }
      .participant { font-size: 1rem; }
      .country { font-size: 0.95rem; }
      .team-block { min-width: 100%; }
      .score-block { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>🏆 World Cup Sweepstake</h1>
      <p>Live match results by team owner</p>
    </div>

    <h2 class="section-title">Match Results by Team Owner</h2>
    <div class="live-box">
      <div class="badge">Step 1: sample data</div>
      <p class="muted">
        API 연결 전에는 샘플 경기 결과를 보여줍니다.
      </p>
      <ul class="match-list" id="live-results"></ul>
    </div>

    <h2 class="section-title">Draw Results</h2>
    <div class="cards" id="draw-cards"></div>

    <p class="footer-note">
      Built for the office sweepstake 🍀
    </p>
  </div>

  <script>
    const drawData = [
      { participant: "Alex Haines", country: "Norway" },
      { participant: "Allison Clark", country: "South Africa" },
      { participant: "Andrew Snoad", country: "Morocco" },
      { participant: "Andrew Snoad", country: "Switzerland" },
      { participant: "Anna Smith", country: "Argentina" },
      { participant: "Charlie Finchett", country: "Belgium" },
      { participant: "Chris Flach", country: "Jordan" },
      { participant: "Chris Flach", country: "Mexico" },
      { participant: "Dami Osibeluwo", country: "Austria" },
      { participant: "David Mann", country: "Congo (DRC)" },
      { participant: "David Mann", country: "Australia" },
      { participant: "Ed hull", country: "France" },
      { participant: "Ed hull", country: "England" },
      { participant: "Emily Davis", country: "Japan" },
      { participant: "Gary Hutton", country: "Panama" },
      { participant: "Gary Hutton", country: "Ecuador" },
      { participant: "Gerri Speirs", country: "United States" },
      { participant: "Jack Cornish", country: "Senegal" },
      { participant: "Joanna Guentangue", country: "Colombia" },
      { participant: "Joseph Bluemel", country: "Canada" },
      { participant: "Katie Lovegrove", country: "Qatar" },
      { participant: "Luke Armitage", country: "Iran" },
      { participant: "Mark Wallace", country: "Scotland" },
      { participant: "Matthew Miller", country: "Türkiye" },
      { participant: "Matthew Miller", country: "Saudi Arabia" },
      { participant: "Nibash Gun", country: "Germany" },
      { participant: "Nicholas Crowe", country: "Curacao" },
      { participant: "Nicholas Crowe", country: "Ghana" },
      { participant: "Niel Du Preez", country: "Brazil" },
      { participant: "Nikki Foxall", country: "Egypt" },
      { participant: "Patrick Ahern", country: "Haiti" },
      { participant: "Peter Benning", country: "Croatia" },
      { participant: "Peter Benning", country: "Spain" },
      { participant: "Peter Robinson", country: "Cabo Verde" },
      { participant: "Peter Robinson", country: "Uzbekistan" },
      { participant: "Rob McBride", country: "Tunisia" },
      { participant: "Samuel Davies", country: "Bosnia & Herzegovina" },
      { participant: "Samuel Davies", country: "Iraq" },
      { participant: "Sarah Fallon", country: "Côte d’Ivoire" },
      { participant: "Sean Berry", country: "Czechia" },
      { participant: "Shayna Gail Velasquez", country: "Sweden" },
      { participant: "Soojin Choe", country: "Uruguay" },
      { participant: "Soojin Choe", country: "Portugal" },
      { participant: "Terry Gell", country: "Korea" },
      { participant: "Thomas Blunt", country: "New Zealand" },
      { participant: "Thomas Blunt", country: "Netherlands" },
      { participant: "Tim Hewer", country: "Algeria" },
      { participant: "Tim Hewer", country: "Paraguay" }
    ];

    const countryAliases = {
      "South Korea": "Korea",
      "Ivory Coast": "Côte d’Ivoire",
      "Turkey": "Türkiye",
      "USA": "United States",
      "United States of America": "United States",
      "DR Congo": "Congo (DRC)",
      "Cape Verde": "Cabo Verde"
    };

    const countryCodeMap = {
      "Norway": "no",
      "South Africa": "za",
      "Morocco": "ma",
      "Switzerland": "ch",
      "Argentina": "ar",
      "Belgium": "be",
      "Jordan": "jo",
      "Mexico": "mx",
      "Austria": "at",
      "Congo (DRC)": "cd",
      "Australia": "au",
      "France": "fr",
      "England": "gb-eng",
      "Japan": "jp",
      "Panama": "pa",
      "Ecuador": "ec",
      "United States": "us",
      "Senegal": "sn",
      "Colombia": "co",
      "Canada": "ca",
      "Qatar": "qa",
      "Iran": "ir",
      "Scotland": "gb-sct",
      "Türkiye": "tr",
      "Saudi Arabia": "sa",
      "Germany": "de",
      "Curacao": "cw",
      "Ghana": "gh",
      "Brazil": "br",
      "Egypt": "eg",
      "Haiti": "ht",
      "Croatia": "hr",
      "Spain": "es",
      "Cabo Verde": "cv",
      "Uzbekistan": "uz",
      "Tunisia": "tn",
      "Bosnia & Herzegovina": "ba",
      "Iraq": "iq",
      "Côte d’Ivoire": "ci",
      "Czechia": "cz",
      "Sweden": "se",
      "Uruguay": "uy",
      "Portugal": "pt",
      "Korea": "kr",
      "New Zealand": "nz",
      "Netherlands": "nl",
      "Algeria": "dz",
      "Paraguay": "py"
    };

    function normalizeCountryName(name) {
      return countryAliases[name] || name;
    }

    function getFlagUrl(countryName) {
      const normalized = normalizeCountryName(countryName);
      const code = countryCodeMap[normalized];
      if (!code) return "";
      return `https://flagcdn.com/24x18/${code}.png`;
    }

    function buildCountryOwnerMap(data) {
      const map = {};
      data.forEach(item => {
        const country = normalizeCountryName(item.country);
        if (!map[country]) {
          map[country] = [];
        }
        map[country].push(item.participant);
      });
      return map;
    }

    const countryOwnerMap = buildCountryOwnerMap(drawData);

    function getOwners(countryName) {
      const normalized = normalizeCountryName(countryName);
      return countryOwnerMap[normalized] || [];
    }

    const drawCards = document.getElementById("draw-cards");

    drawData.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      const flagUrl = getFlagUrl(item.country);

      card.innerHTML = `
        <div class="participant">${item.participant}</div>
        <div class="country-line">
          ${flagUrl ? `<img class="team-flag" src="${flagUrl}" alt="${item.country} flag/div>
        </div>
      `;
      drawCards.appendChild(card);
    });

    const liveMatches = [
      {
        homeTeam: "Portugal",
        awayTeam: "Brazil",
        homeScore: 2,
        awayScore: 1,
        status: "LIVE"
      },
      {
        homeTeam: "Korea",
        awayTeam: "Uruguay",
        homeScore: 0,
        awayScore: 0,
        status: "HT"
      },
      {
        homeTeam: "Netherlands",
        awayTeam: "England",
        homeScore: 1,
        awayScore: 3,
        status: "FT"
      }
    ];

    function renderLiveMatches(matches) {
      const list = document.getElementById("live-results");
      list.innerHTML = "";

      matches.forEach(match => {
        const homeOwners = getOwners(match.homeTeam);
        const awayOwners = getOwners(match.awayTeam);
        const homeFlag = getFlagUrl(match.homeTeam);
        const awayFlag = getFlagUrl(match.awayTeam);

        const li = document.createElement("li");
        li.innerHTML = `
          <div class="match-row">
            <div class="team-block">
              ${homeFlag ? `<img class="team-flag" src="${homeFlag}" alt="${match.homeTeam} flagch.homeTeam}</strong>
                <span class="owner">${homeOwners.join(", ") || "No owner"}</span>
              </div>
            </div>

            <div class="score-block">${match.homeScore} - ${match.awayScore}</div>

            <div class="team-block" style="justify-content:flex-end; text-align:right;">
              <div>
                <strong>${match.awayTeam}</strong>
                <span class="owner">${awayOwners.join(", ") || "No owner"}</span>
              </div>
              ${awayFlag ? `<img class="team-flag" src="${awayFlag}" alt="${match.awayTeam} flagv class="muted">Status: ${match.status}</div>
        `;
        list.appendChild(li);
      });
    }

    renderLiveMatches(liveMatches);
  </script>
</body>
</html>
