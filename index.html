<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Sweepstake</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .container {
      max-width: 1250px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2.2rem;
      color: #111827;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }

    h2 {
      margin-top: 32px;
      margin-bottom: 16px;
      font-size: 2rem;
      color: #111827;
    }

    .box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 8px 18px;
      margin-bottom: 32px;
    }

    .match-item {
      padding: 18px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .match-item:last-child {
      border-bottom: none;
    }

    /* 핵심: 항상 가운데 score가 오도록 grid 사용 */
    .match-line {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 16px;
    }

    .team-left,
    .team-right {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
    }

    .team-left {
      justify-content: flex-start;
      text-align: left;
    }

    .team-right {
      justify-content: flex-end;
      text-align: right;
    }

    .team-name {
      font-weight: 700;
      color: #111827;
      white-space: nowrap;
    }

    .owner {
      color: #6b7280;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .score {
      font-weight: 700;
      font-size: 1.1rem;
      color: #111827;
      text-align: center;
      min-width: 72px;
    }

    .status {
      margin-top: 8px;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      text-align: left;
    }

    .country {
      color: #1e3a8a;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .participant {
      color: #6b7280;
      font-size: 0.95rem;
    }

    @media (max-width: 850px) {
      .match-line {
        grid-template-columns: 1fr;
        row-gap: 8px;
      }

      .team-right {
        justify-content: flex-start;
        text-align: left;
      }

      .score {
        text-align: left;
      }

      h2 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏆 World Cup Sweepstake</h1>
    <div class="subtitle">Match Results by Team Owner</div>

    <h2>Match Results by Team Owner</h2>
    <div class="box" id="match-results"></div>

    <h2>Draw Results</h2>
    <div class="cards" id="draw-results"></div>
  </div>

  <script>
    const drawData = [
      { participant: "Alex Haines", country: "Norway" },
      { participant: "Allison Clark", country: "South Africa" },
      { participant: "Andrew Snoad", country: "Morocco" },
      { participant: "Andrew Snoad", country: "Switzerland" },
      { participant: "Anna Smith", country: "Argentina" },
      { participant: "Charlie Finchett", country: "Belgium" },
      { participant: "Chris Flach", country: "Jordan" },
      { participant: "Chris Flach", country: "Mexico" },
      { participant: "Dami Osibeluwo", country: "Austria" },
      { participant: "David Mann", country: "Congo (DRC)" },
      { participant: "David Mann", country: "Australia" },
      { participant: "Ed hull", country: "France" },
      { participant: "Ed hull", country: "England" },
      { participant: "Emily Davis", country: "Japan" },
      { participant: "Gary Hutton", country: "Panama" },
      { participant: "Gary Hutton", country: "Ecuador" },
      { participant: "Gerri Speirs", country: "United States" },
      { participant: "Jack Cornish", country: "Senegal" },
      { participant: "Joanna Guentangue", country: "Colombia" },
      { participant: "Joseph Bluemel", country: "Canada" },
      { participant: "Katie Lovegrove", country: "Qatar" },
      { participant: "Luke Armitage", country: "Iran" },
      { participant: "Mark Wallace", country: "Scotland" },
      { participant: "Matthew Miller", country: "Türkiye" },
      { participant: "Matthew Miller", country: "Saudi Arabia" },
      { participant: "Nibash Gun", country: "Germany" },
      { participant: "Nicholas Crowe", country: "Curacao" },
      { participant: "Nicholas Crowe", country: "Ghana" },
      { participant: "Niel Du Preez", country: "Brazil" },
      { participant: "Nikki Foxall", country: "Egypt" },
      { participant: "Patrick Ahern", country: "Haiti" },
      { participant: "Peter Benning", country: "Croatia" },
      { participant: "Peter Benning", country: "Spain" },
      { participant: "Peter Robinson", country: "Cabo Verde" },
      { participant: "Peter Robinson", country: "Uzbekistan" },
      { participant: "Rob McBride", country: "Tunisia" },
      { participant: "Samuel Davies", country: "Bosnia & Herzegovina" },
      { participant: "Samuel Davies", country: "Iraq" },
      { participant: "Sarah Fallon", country: "Côte d’Ivoire" },
      { participant: "Sean Berry", country: "Czechia" },
      { participant: "Shayna Gail Velasquez", country: "Sweden" },
      { participant: "Soojin Choe", country: "Uruguay" },
      { participant: "Soojin Choe", country: "Portugal" },
      { participant: "Terry Gell", country: "Korea" },
      { participant: "Thomas Blunt", country: "New Zealand" },
      { participant: "Thomas Blunt", country: "Netherlands" },
      { participant: "Tim Hewer", country: "Algeria" },
      { participant: "Tim Hewer", country: "Paraguay" }
    ];

    const sampleMatches = [
      { homeTeam: "Portugal", awayTeam: "Brazil", homeScore: 2, awayScore: 1, status: "LIVE" },
      { homeTeam: "Korea", awayTeam: "Uruguay", homeScore: 0, awayScore: 0, status: "HT" },
      { homeTeam: "Netherlands", awayTeam: "England", homeScore: 1, awayScore: 3, status: "FT" }
    ];

    function getOwners(country) {
      const owners = [];
      for (let i = 0; i < drawData.length; i++) {
        if (drawData[i].country === country) {
          owners.push(drawData[i].participant);
        }
      }
      return owners;
    }

    function renderMatches() {
      const container = document.getElementById("match-results");
      let html = "";

      for (let i = 0; i < sampleMatches.length; i++) {
        const match = sampleMatches[i];
        const homeOwnerText = getOwners(match.homeTeam).join(", ") || "No owner";
        const awayOwnerText = getOwners(match.awayTeam).join(", ") || "No owner";

        html += `
          <div class="match-item">
            <div class="match-line">
              <div class="team-left">
                <span class="team-name">${match.homeTeam}</span>
                <span class="owner">(${homeOwnerText})</span>
              </div>

              <div class="score">${match.homeScore} : ${match.awayScore}</div>

              <div class="team-right">
                <span class="team-name">${match.awayTeam}</span>
                <span class="owner">(${awayOwnerText})</span>
              </div>
            </div>
            <div class="status">Status: ${match.status}</div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function renderDraws() {
      const container = document.getElementById("draw-results");
      let html = "";

      for (let i = 0; i < drawData.length; i++) {
        const item = drawData[i];
        html += `
          <div class="card">
            <div class="country">${item.country}</div>
            <div class="participant">${item.participant}</div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    renderMatches();
    renderDraws();
  </script>
</body>
</html>
